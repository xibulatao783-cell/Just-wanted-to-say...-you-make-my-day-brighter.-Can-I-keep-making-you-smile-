<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para sa Pinaka-Special ✨</title>
    <style>
        body {
            background-color: #ffdeeb; /* Pink na background katulad ng nasa video */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 350px;
        }
        h1 { color: #d63384; font-size: 20px; line-height: 1.4; margin-bottom: 20px; }
        img { width: 140px; margin-bottom: 20px; }
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 80px;
            position: relative;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        #yesBtn { background-color: #4CAF50; color: white; }
        #noBtn { background-color: #f44336; color: white; position: absolute; }
    </style>
</head>
<body>

    <div class="container">
        <!-- ITO YUNG MESSAGE NA GUSTO MO -->
        <h1 id="header">Just wanted to say... you make my day brighter. Can I keep making you smile? ✨</h1>
        <img id="chiikawa" src="https://media.tenor.com" alt="Cute Cat">
        
        <div class="btn-group">
            <button id="yesBtn" onclick="showLove()">Yes! 😊</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No ☹️</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            // Pinapagalaw ang "No" button sa random na lugar sa screen
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function showLove() {
            // Ang lalabas kapag pinindot ang "Yes"
            document.getElementById('header').innerHTML = "I promise to always try my best to make you happy. ❤️✨";
            document.getElementById('chiikawa').src = "https://media.tenor.com";
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').style.transform = 'scale(1.4)';
            document.getElementById('yesBtn').innerHTML = "See you soon! 🥰";
        }
    </script>

</body>
</html>
